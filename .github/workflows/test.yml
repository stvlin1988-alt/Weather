name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_unified

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app_unified/requirements.txt

      - name: Install system dependencies (for dlib)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libopenblas-dev liblapack-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          DATABASE_URL: sqlite:///:memory:
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app_unified/htmlcov/
