{% extends "base.html" %}
{% block title %}登入 — NOTE{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:2rem auto;">
  <h2 style="margin-bottom:1.5rem;">登入</h2>
  <div class="form-group">
    <label>使用者名稱</label>
    <input type="text" id="username" autocomplete="username" inputmode="text">
  </div>
  <div class="form-group">
    <label>4 位數 PIN</label>
    <input type="password" id="pin" maxlength="4" inputmode="numeric" autocomplete="current-password">
  </div>
  <div class="form-group" id="face-section" style="display:none;">
    <label>人臉驗證</label>
    <video id="video" autoplay playsinline muted style="width:100%;max-width:320px;border-radius:6px;background:#000;display:block;margin-bottom:.5rem;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>
  <div id="msg" style="margin-bottom:.75rem;color:#e74c3c;min-height:1.4em;font-size:.95rem;"></div>
  <button class="btn btn-primary" id="btn-login" style="width:100%;">登入</button>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
const cam = new Camera('video', 'canvas');
let faceRequired = false;

async function startCamera() {
  document.getElementById('face-section').style.display = 'block';
  try {
    await cam.start();
  } catch (err) {
    document.getElementById('msg').textContent = err.message || '無法開啟鏡頭';
  }
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const msg = document.getElementById('msg');
  msg.style.color = '#e74c3c';
  msg.textContent = '';

  if (!username || !pin) {
    msg.textContent = '請輸入帳號和 PIN';
    return;
  }

  const body = { username, pin };
  if (cam.isRecording) body.face_image = cam.capture();

  const res = await fetch('/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json();

  if (data.status === 'ok') {
    location.href = data.redirect || '/notes/';

  } else if (data.status === 'need_face_enroll') {
    // First login: no face yet → go to face enrollment
    location.href = data.redirect;

  } else if (data.status === 'face_required') {
    // User has face enrolled but didn't provide one → auto-start camera
    faceRequired = true;
    msg.style.color = '#e67e22';
    msg.textContent = '請開啟鏡頭進行人臉驗證';
    await startCamera();

  } else if (data.status === 'wrong_password') {
    msg.textContent = '帳號或密碼錯誤';
    faceRequired = false;

  } else if (data.status === 'face_mismatch') {
    msg.textContent = '人臉驗證失敗，請重試';

  } else {
    msg.textContent = '登入失敗，請重試';
  }
}

document.getElementById('btn-login').onclick = doLogin;

document.getElementById('pin').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
{% endblock %}
