{% extends "base.html" %}
{% block title %}人臉設定{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:2rem auto;">
  <h2 style="margin-bottom:1.5rem;">登錄 / 更新人臉</h2>
  {% if request.args.get('first') %}
  <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.95rem;">
    ⚠️ 首次登入：請先建立人臉才能使用系統
  </div>
  {% else %}
  {% if users %}
  <div style="margin-bottom:1rem;">
    <label style="display:block;font-size:.9rem;margin-bottom:.25rem;">選擇使用者</label>
    <select id="target-user" style="font-size:1rem;padding:.4rem .6rem;border-radius:6px;border:1px solid #ddd;width:100%;min-height:36px;" onchange="updateUserStatus()">
      {% for u in users %}
      <option value="{{ u.id }}" {% if u.id == current_user.id %}selected{% endif %}
        data-has-face="{{ '1' if u.face_encoding else '0' }}"
        data-store="{{ u.store or '' }}">{{ u.username }}{% if u.store %} ({{ u.store }}店){% endif %}</option>
      {% endfor %}
    </select>
  </div>
  <p id="user-face-status" style="margin-bottom:1rem;font-size:.9rem;"></p>
  {% endif %}
  {% endif %}
  <video id="video" autoplay playsinline style="width:100%;max-width:320px;border-radius:6px;background:#000;display:block;margin-bottom:.5rem;"></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap;">
    <button class="btn btn-secondary" id="btn-start" style="flex:1;min-width:120px;">開啟鏡頭</button>
    <button class="btn btn-primary" id="btn-capture" disabled style="flex:1;min-width:120px;">拍照</button>
  </div>
  <div id="preview" style="margin-bottom:.5rem;"></div>
  <div id="msg" style="color:#e74c3c;min-height:1.4em;margin-bottom:.5rem;"></div>
  <button class="btn btn-success" id="btn-enroll" style="width:100%;" disabled>儲存人臉</button>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
const cam = new Camera('video', 'canvas');
let captured = null;

function updateUserStatus() {
  var sel = document.getElementById('target-user');
  var statusEl = document.getElementById('user-face-status');
  if (!sel || !statusEl) return;
  var opt = sel.options[sel.selectedIndex];
  var hasFace = opt.getAttribute('data-has-face') === '1';
  if (hasFace) {
    statusEl.style.color = '#27ae60';
    statusEl.textContent = '✅ 已有人臉資料（可重新登錄覆蓋）';
  } else {
    statusEl.style.color = '#e67e22';
    statusEl.textContent = '⚠️ 尚未登錄人臉';
  }
}
updateUserStatus();

document.getElementById('btn-start').onclick = () =>
  cam.start()
    .then(() => {
      document.getElementById('btn-capture').disabled = false;
      document.getElementById('btn-start').disabled = true;
    })
    .catch(err => {
      document.getElementById('msg').textContent = err.message || '無法開啟鏡頭';
    });

document.getElementById('btn-capture').onclick = () => {
  captured = cam.capture();
  const img = document.createElement('img');
  img.src = captured;
  img.style.cssText = 'width:120px;border-radius:6px;border:2px solid #3498db;';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('preview').appendChild(img);
  document.getElementById('btn-enroll').disabled = false;
};

const isFirst = new URLSearchParams(location.search).get('first');

document.getElementById('btn-enroll').onclick = async () => {
  const msg = document.getElementById('msg');
  var payload = { face_image: captured };
  var sel = document.getElementById('target-user');
  if (sel) payload.user_id = parseInt(sel.value);
  var targetName = sel ? sel.options[sel.selectedIndex].text : '';

  const res = await fetch('/face/enroll', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.status === 'ok') {
    msg.style.color = '#27ae60';
    msg.textContent = isFirst ? '人臉登錄成功！即將進入系統⋯' : '「' + targetName + '」人臉登錄成功！';
    if (isFirst) {
      setTimeout(() => { location.href = '/notes/'; }, 1500);
    }
  } else {
    msg.textContent = data.message || '失敗，請重試';
  }
};
</script>
{% endblock %}
