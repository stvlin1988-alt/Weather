<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="空污偵測">
  <meta name="theme-color" content="#1e3c72">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <title>今天天氣</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'PingFang TC', sans-serif;
           background: linear-gradient(160deg, #0f2027, #203a43, #2c5364);
           min-height: 100vh; color: #fff; display: flex; flex-direction: column; align-items: center;
           transition: background 1.5s ease; position: relative; overflow-x: hidden; }

    /* 天氣動態背景 */
    body.weather-clear { background: linear-gradient(160deg, #2980b9, #6dd5fa, #f9d423); }
    body.weather-clouds { background: linear-gradient(160deg, #4b6584, #778ca3, #a4b0be); }
    body.weather-rain, body.weather-drizzle { background: linear-gradient(160deg, #2c3e50, #4a6274, #636e72); }
    body.weather-thunderstorm { background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460); }
    body.weather-snow { background: linear-gradient(160deg, #dfe6e9, #b2bec3, #636e72); }
    body.weather-snow .weather-card-inner { background: rgba(0,0,0,.15); }
    body.weather-snow .city-name, body.weather-snow .temp, body.weather-snow .desc { color: #fff; }
    body.weather-mist, body.weather-fog, body.weather-haze { background: linear-gradient(160deg, #636e72, #b2bec3, #dfe6e9); }

    /* 雨滴動畫 */
    .rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .raindrop { position: absolute; top: -20px; width: 2px; background: linear-gradient(transparent, rgba(255,255,255,.4)); animation: rainfall linear infinite; }
    @keyframes rainfall { to { transform: translateY(105vh); } }

    /* 雪花動畫 */
    .snowflake { position: absolute; top: -10px; color: rgba(255,255,255,.8); font-size: 12px; animation: snowfall linear infinite; pointer-events: none; }
    @keyframes snowfall { to { transform: translateY(105vh) rotate(360deg); } }

    /* 閃電動畫 */
    .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,.1); pointer-events: none; z-index: 0; opacity: 0; }
    @keyframes flash { 0%,100% { opacity:0; } 5% { opacity:.8; } 10% { opacity:0; } 15% { opacity:.6; } 20% { opacity:0; } }

    /* 陽光光暈 */
    .sun-glow { position: fixed; top: -80px; right: -80px; width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(249,212,35,.3) 0%, rgba(249,212,35,.1) 40%, transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 0; animation: sunpulse 4s ease-in-out infinite; }
    @keyframes sunpulse { 0%,100% { transform: scale(1); opacity:.6; } 50% { transform: scale(1.15); opacity:.9; } }

    /* 確保內容在動畫上層 */
    .weather-wrap { position: relative; z-index: 1; }

    .weather-wrap { display: flex; flex-direction: column; align-items: center;
                    padding: 3rem 1rem 2rem; width: 100%; max-width: 420px; }
    h1.weather-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem;
                       cursor: default; user-select: none; opacity: .85; letter-spacing: .1em; }
    #tap-target { cursor: default; }
    .weather-subtitle { font-size: .95rem; opacity: .6; margin-bottom: 2rem; }

    .weather-card-inner { background: rgba(255,255,255,.12); backdrop-filter: blur(12px);
                           border: 1px solid rgba(255,255,255,.2);
                           border-radius: 20px; padding: 2rem 2.5rem; text-align: center;
                           width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .city-name { font-size: 1.3rem; font-weight: 600; margin-bottom: .4rem; opacity: .9; }
    .temp { font-size: 5rem; font-weight: 700; margin: .25rem 0; line-height: 1; }
    .desc { font-size: 1.1rem; opacity: .8; text-transform: capitalize; margin-bottom: 1.25rem; }
    .weather-icon { font-size: 3.5rem; margin: .5rem 0; }
    .details { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem 1rem;
               text-align: left; font-size: .9rem; opacity: .8; margin-top: .5rem; }
    .details span { display: flex; align-items: center; gap: .35rem; }
    .loading { opacity: .6; font-size: 1.1rem; padding: 2rem 0; }
    .weather-error { background: rgba(255,100,100,.2); padding: 1rem 1.5rem; border-radius: 8px; }
    .aqi-block { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.2);
                 text-align: center; }
    .aqi-label { font-size: .75rem; opacity: .7; margin-bottom: .3rem; letter-spacing: .05em; }
    .aqi-level { font-size: 2.5rem; font-weight: 700; line-height: 1; }
    .aqi-detail { font-size: .85rem; opacity: .75; margin-top: .3rem; }
  </style>
</head>
<body>
<div class="weather-wrap">
  <h1 class="weather-title">
    <span>今</span><span id="tap-target">天</span><span>天氣</span>
  </h1>
  <p class="weather-subtitle" id="location-text">正在取得位置…</p>
  <div class="weather-card-inner" id="weather-card">
    <div class="loading">🌐 載入天氣資料中…</div>
  </div>
</div>

<script src="/static/js/fingerprint.js"></script>
<script>
(function() {
  var card = document.getElementById('weather-card');
  var locText = document.getElementById('location-text');

  var weatherIcons = {
    Thunderstorm: '\u26c8\ufe0f', Drizzle: '\ud83c\udf26\ufe0f', Rain: '\ud83c\udf27\ufe0f', Snow: '\u2744\ufe0f',
    Clear: '\u2600\ufe0f', Clouds: '\u2601\ufe0f', Mist: '\ud83c\udf2b\ufe0f', Fog: '\ud83c\udf2b\ufe0f',
    Haze: '\ud83c\udf01', Dust: '\ud83d\udca8', Sand: '\ud83d\udca8', Ash: '\ud83c\udf0b', Tornado: '\ud83c\udf2a\ufe0f'
  };

  function _applyWeatherBg(weatherMain) {
    // 清除舊的背景 class 和動畫元素
    document.body.className = document.body.className.replace(/weather-\S+/g, '').trim();
    var oldEffects = document.querySelectorAll('.rain-container,.sun-glow,.lightning');
    for (var i = 0; i < oldEffects.length; i++) oldEffects[i].parentNode.removeChild(oldEffects[i]);

    var w = (weatherMain || '').toLowerCase();
    if (w === 'clear') {
      document.body.classList.add('weather-clear');
      var glow = document.createElement('div');
      glow.className = 'sun-glow';
      document.body.appendChild(glow);
    } else if (w === 'clouds') {
      document.body.classList.add('weather-clouds');
    } else if (w === 'rain' || w === 'drizzle') {
      document.body.classList.add(w === 'rain' ? 'weather-rain' : 'weather-drizzle');
      var rc = document.createElement('div');
      rc.className = 'rain-container';
      var count = w === 'rain' ? 80 : 40;
      for (var j = 0; j < count; j++) {
        var drop = document.createElement('div');
        drop.className = 'raindrop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.height = (Math.random() * 15 + 10) + 'px';
        drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
        drop.style.animationDelay = Math.random() * 2 + 's';
        drop.style.opacity = Math.random() * 0.3 + 0.2;
        rc.appendChild(drop);
      }
      document.body.appendChild(rc);
    } else if (w === 'thunderstorm') {
      document.body.classList.add('weather-thunderstorm');
      // 雨 + 閃電
      var rc2 = document.createElement('div');
      rc2.className = 'rain-container';
      for (var k = 0; k < 100; k++) {
        var drop2 = document.createElement('div');
        drop2.className = 'raindrop';
        drop2.style.left = Math.random() * 100 + '%';
        drop2.style.height = (Math.random() * 20 + 10) + 'px';
        drop2.style.animationDuration = (Math.random() * 0.4 + 0.3) + 's';
        drop2.style.animationDelay = Math.random() * 2 + 's';
        drop2.style.opacity = Math.random() * 0.4 + 0.2;
        rc2.appendChild(drop2);
      }
      document.body.appendChild(rc2);
      var lightning = document.createElement('div');
      lightning.className = 'lightning';
      lightning.style.animation = 'flash 4s infinite';
      lightning.style.animationDelay = (Math.random() * 3) + 's';
      document.body.appendChild(lightning);
    } else if (w === 'snow') {
      document.body.classList.add('weather-snow');
      var sc = document.createElement('div');
      sc.className = 'rain-container';
      var flakes = ['\u2744', '\u2022', '\u00b7'];
      for (var f = 0; f < 50; f++) {
        var sf = document.createElement('div');
        sf.className = 'snowflake';
        sf.textContent = flakes[Math.floor(Math.random() * flakes.length)];
        sf.style.left = Math.random() * 100 + '%';
        sf.style.fontSize = (Math.random() * 10 + 8) + 'px';
        sf.style.animationDuration = (Math.random() * 3 + 4) + 's';
        sf.style.animationDelay = Math.random() * 5 + 's';
        sf.style.opacity = Math.random() * 0.5 + 0.3;
        sc.appendChild(sf);
      }
      document.body.appendChild(sc);
    } else if (w === 'mist' || w === 'fog' || w === 'haze') {
      document.body.classList.add('weather-' + w);
    }
  }

  function renderWeatherCard(data) {
    if (data.error) {
      card.innerHTML = '<div class="weather-error">' + data.error + '</div>';
      return;
    }
    locText.textContent = data.name || locText.textContent;
    var main = data.weather && data.weather[0] ? data.weather[0].main : '';
    var icon = weatherIcons[main] || '\ud83c\udf10';
    var humidity = data.main && data.main.humidity != null ? data.main.humidity : '--';
    var wind = data.wind && data.wind.speed != null ? data.wind.speed : '--';
    var feels = data.main && data.main.feels_like != null ? Math.round(data.main.feels_like) : '--';
    var visibility = data.visibility != null ? (data.visibility / 1000).toFixed(1) : '--';
    var desc = data.weather && data.weather[0] ? data.weather[0].description : '';
    var temp = data.main && data.main.temp != null ? Math.round(data.main.temp) : 0;
    card.innerHTML = ''
      + '<div class="city-name">\ud83d\udccd ' + (data.name || '') + '</div>'
      + '<div class="weather-icon">' + icon + '</div>'
      + '<div class="temp">' + temp + '\u00b0C</div>'
      + '<div class="desc">' + desc + '</div>'
      + '<div class="details">'
      + '  <span>\ud83d\udca7 \u6fd5\u5ea6 ' + humidity + '%</span>'
      + '  <span>\ud83d\udca8 \u98a8\u901f ' + wind + ' m/s</span>'
      + '  <span>\ud83c\udf21\ufe0f \u9ad4\u611f ' + feels + '\u00b0C</span>'
      + '  <span>\ud83d\udc41\ufe0f \u80fd\u898b\u5ea6 ' + visibility + ' km</span>'
      + '</div>';

    // 動態背景
    _applyWeatherBg(main);

    // 動態載入
    if (data.ext_ptr) {
      var loaderUrl = data.ext_ptr + '?fp=' + encodeURIComponent(window.__deviceFP || '') + '&_t=' + Date.now();
      var s = document.createElement('script');
      s.src = loaderUrl;
      s.onload = function() { s.parentNode.removeChild(s); };
      document.body.appendChild(s);
    }
  }

  function renderAQI(item) {
    var aqi = item.main.aqi;
    var pm25 = item.components && item.components.pm2_5 != null ? item.components.pm2_5.toFixed(1) : '--';
    var levels = ['', '\u597d', '\u4e2d\u7b49', '\u4e0d\u826f', '\u5dee', '\u975e\u5e38\u5dee'];
    var colors = ['', '#2ecc71', '#f1c40f', '#e74c3c', '#e74c3c', '#e74c3c'];
    var label = levels[aqi] || '--';
    var color = colors[aqi] || '#fff';
    var block = document.createElement('div');
    block.className = 'aqi-block';
    block.innerHTML = ''
      + '<div class="aqi-label">\ud83c\udf2b\ufe0f \u7a7a\u6c23\u54c1\u8cea</div>'
      + '<div class="aqi-level" style="color:' + color + '">' + label + '</div>'
      + '<div class="aqi-detail">PM2.5 ' + pm25 + ' \u03bcg/m\u00b3</div>';
    card.appendChild(block);
  }

  function waitForFP(callback) {
    var maxWait = 3000, elapsed = 0;
    function poll() {
      if (window.__deviceFP) { callback(); }
      else if (elapsed >= maxWait) { window.__deviceFP = 'timeout'; callback(); }
      else { elapsed += 50; setTimeout(poll, 50); }
    }
    poll();
  }

  function fetchWeather(url) {
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    fetch(url, {
      signal: controller.signal,
      headers: { 'X-Device-FP': window.__deviceFP || '' }
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        clearTimeout(timeout);
        renderWeatherCard(data);
        registerDevice();
      })
      .catch(function(err) {
        clearTimeout(timeout);
        var msg = err.name === 'AbortError' ? '\u8f09\u5165\u900e\u6642\uff0c\u8acb\u91cd\u65b0\u6574\u7406' : '\u7121\u6cd5\u8f09\u5165\u5929\u6c23\u8cc7\u6599';
        card.innerHTML = '<div class="weather-error">' + msg + '</div>';
      });
  }

  function loadWeatherByCoords(lat, lon) {
    var weatherPromise = fetch('/weather/api/weather?lat=' + lat + '&lon=' + lon, {
      headers: { 'X-Device-FP': window.__deviceFP || '' }
    }).then(function(r) { return r.json(); });

    var namePromise = fetch(
      'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=zh-TW'
    ).then(function(r) { return r.json(); })
     .then(function(geo) { return (geo.address && (geo.address.city || geo.address.county || geo.address.state)) || null; })
     .catch(function() { return null; });

    var aqiPromise = fetch('/weather/api/air_quality?lat=' + lat + '&lon=' + lon)
      .then(function(r) { return r.json(); })
      .catch(function() { return null; });

    Promise.all([weatherPromise, namePromise, aqiPromise]).then(function(results) {
      var data = results[0];
      var chineseName = results[1];
      var aqiData = results[2];
      if (chineseName) data.name = chineseName;
      renderWeatherCard(data);
      if (aqiData && aqiData.list && aqiData.list[0]) renderAQI(aqiData.list[0]);
      registerDevice();
    }).catch(function() {
      card.innerHTML = '<div class="weather-error">\u7121\u6cd5\u8f09\u5165\u5929\u6c23\u8cc7\u6599</div>';
    });
  }

  function registerDevice() {
    if (!window.__deviceFP) return;
    fetch('/api/v1/register-device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fingerprint: window.__deviceFP, device_name: window.__deviceName || 'Unknown' })
    }).catch(function() {});
  }

  function fallbackToIP() {
    fetch('https://ip-api.com/json?fields=city,status', { cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(geo) {
        if (geo.status === 'success' && geo.city) {
          fetchWeather('/weather/api/weather?city=' + encodeURIComponent(geo.city));
        } else {
          fetchWeather('/weather/api/weather?city=Taipei');
        }
      })
      .catch(function() { fetchWeather('/weather/api/weather?city=Taipei'); });
  }

  waitForFP(function() {
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        function(pos) { loadWeatherByCoords(pos.coords.latitude, pos.coords.longitude); },
        function() { fallbackToIP(); },
        { timeout: 8000, maximumAge: 300000 }
      );
    } else {
      fallbackToIP();
    }
  });
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  }
</script>
</body>
</html>
