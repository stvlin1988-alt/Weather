<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="空污偵測">
  <meta name="theme-color" content="#1e3c72">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <title>今天天氣</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'SF Pro Display', 'PingFang TC', 'Segoe UI', sans-serif;
           background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
           min-height: 100vh; color: #fff; display: flex; flex-direction: column; align-items: center;
           transition: background 1.5s ease; position: relative; overflow-x: hidden; }

    /* 天氣動態背景 */
    body.weather-clear { background: linear-gradient(180deg, #1a8fe3, #47a8f5, #87ceeb); }
    body.weather-clouds { background: linear-gradient(180deg, #4b6584, #6b8299, #8e9eaf); }
    body.weather-rain, body.weather-drizzle { background: linear-gradient(180deg, #3d4f5f, #506a7a, #637e8e); }
    body.weather-thunderstorm { background: linear-gradient(180deg, #1a1a2e, #16213e, #0f3460); }
    body.weather-snow { background: linear-gradient(180deg, #7f8fa6, #a4b0be, #dcdde1); }
    body.weather-mist, body.weather-fog, body.weather-haze { background: linear-gradient(180deg, #636e72, #95a5a6, #b2bec3); }

    /* 文字陰影確保可讀性 */
    .text-shadow { text-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .text-shadow-strong { text-shadow: 0 2px 8px rgba(0,0,0,.4); }

    /* 雨滴動畫 */
    .rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .raindrop { position: absolute; top: -20px; width: 2px; background: linear-gradient(transparent, rgba(255,255,255,.4)); animation: rainfall linear infinite; }
    @keyframes rainfall { to { transform: translateY(105vh); } }

    /* 雪花動畫 */
    .snowflake { position: absolute; top: -10px; color: rgba(255,255,255,.8); font-size: 12px; animation: snowfall linear infinite; pointer-events: none; }
    @keyframes snowfall { to { transform: translateY(105vh) rotate(360deg); } }

    /* 閃電動畫 */
    .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,.1); pointer-events: none; z-index: 0; opacity: 0; }
    @keyframes flash { 0%,100% { opacity:0; } 5% { opacity:.8; } 10% { opacity:0; } 15% { opacity:.6; } 20% { opacity:0; } }

    /* 陽光光暈 */
    .sun-glow { position: fixed; top: -80px; right: -80px; width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(249,212,35,.3) 0%, rgba(249,212,35,.1) 40%, transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 0; animation: sunpulse 4s ease-in-out infinite; }
    @keyframes sunpulse { 0%,100% { transform: scale(1); opacity:.6; } 50% { transform: scale(1.15); opacity:.9; } }

    /* 主容器 */
    .weather-wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;
                    padding: 2.5rem 1.25rem 2rem; width: 100%; max-width: 420px; }

    /* 頂部標題區（隱藏入口用） */
    h1.weather-title { font-size: 0.85rem; font-weight: 400; letter-spacing: .15em; opacity: .5;
                       cursor: default; user-select: none; margin-bottom: 1.5rem; }
    #tap-target { cursor: default; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; pointer-events: auto; }
    #tap-target:active, #tap-target:focus { outline: none; background: none; opacity: 1; }

    /* 主要天氣區：城市 + 溫度 + 描述 */
    .hero-section { text-align: center; margin-bottom: 2rem; width: 100%; }
    .city-name { font-size: 2rem; font-weight: 500; letter-spacing: .05em; margin-bottom: .25rem; }
    .temp-main { font-size: 6.5rem; font-weight: 200; line-height: 1; margin: .15rem 0; letter-spacing: -4px; }
    .desc { font-size: 1.25rem; font-weight: 400; opacity: .9; margin-bottom: .4rem; }
    .temp-range { font-size: 1.15rem; font-weight: 400; opacity: .85; }

    /* 毛玻璃卡片通用 */
    .glass-card { background: rgba(255,255,255,.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
                  border: 1px solid rgba(255,255,255,.18); border-radius: 16px;
                  padding: 1.25rem 1.5rem; width: 100%; margin-bottom: 1rem;
                  box-shadow: 0 4px 24px rgba(0,0,0,.15); }

    /* 詳細資訊格狀排列 */
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .detail-item { display: flex; flex-direction: column; }
    .detail-label { font-size: 0.8rem; opacity: .6; margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .05em; }
    .detail-value { font-size: 1.5rem; font-weight: 500; }
    .detail-unit { font-size: 0.85rem; opacity: .7; font-weight: 400; }

    /* AQI 區塊 */
    .aqi-section { display: flex; align-items: center; gap: 1rem; }
    .aqi-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
                  font-size: 1.1rem; font-weight: 700; flex-shrink: 0; border: 2px solid rgba(255,255,255,.3); }
    .aqi-info { flex: 1; }
    .aqi-title { font-size: 0.8rem; opacity: .6; margin-bottom: .2rem; }
    .aqi-level-text { font-size: 1.4rem; font-weight: 600; }
    .aqi-pm25 { font-size: 0.9rem; opacity: .7; margin-top: .15rem; }

    /* 載入與錯誤 */
    .loading { opacity: .6; font-size: 1.1rem; padding: 3rem 0; text-align: center; }
    .weather-error { background: rgba(255,100,100,.15); padding: 1rem 1.5rem; border-radius: 12px; text-align: center; }

    /* 隱藏初始佔位 */
    .hero-section, .details-section, .aqi-card { display: none; }
    .hero-section.show, .details-section.show, .aqi-card.show { display: block; }
  </style>
</head>
<body>
<div class="weather-wrap">
  <h1 class="weather-title text-shadow">
    <span>今</span><span id="tap-target">天</span><span>天氣</span>
  </h1>

  <!-- 主要天氣顯示 -->
  <div class="hero-section text-shadow-strong" id="hero-section">
    <div class="city-name" id="city-name"></div>
    <div class="temp-main" id="temp-main"></div>
    <div class="desc" id="weather-desc"></div>
    <div class="temp-range" id="temp-range"></div>
  </div>

  <!-- 載入中 -->
  <div id="loading-block">
    <div class="loading">載入天氣資料中…</div>
  </div>

  <!-- 錯誤 -->
  <div id="error-block" style="display:none;width:100%;"></div>

  <!-- 詳細資訊 -->
  <div class="glass-card details-section" id="details-section">
    <div class="details-grid">
      <div class="detail-item">
        <span class="detail-label">體感溫度</span>
        <span class="detail-value" id="d-feels"></span>
      </div>
      <div class="detail-item">
        <span class="detail-label">濕度</span>
        <span class="detail-value" id="d-humidity"></span>
      </div>
      <div class="detail-item">
        <span class="detail-label">風速</span>
        <span class="detail-value" id="d-wind"></span>
      </div>
      <div class="detail-item">
        <span class="detail-label">能見度</span>
        <span class="detail-value" id="d-visibility"></span>
      </div>
    </div>
  </div>

  <!-- 空氣品質 -->
  <div class="glass-card aqi-card" id="aqi-card">
    <div class="aqi-section">
      <div class="aqi-circle" id="aqi-circle"></div>
      <div class="aqi-info">
        <div class="aqi-title">空氣品質</div>
        <div class="aqi-level-text" id="aqi-level-text"></div>
        <div class="aqi-pm25" id="aqi-pm25"></div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/fingerprint.js"></script>
<script>
(function() {
  var heroSection = document.getElementById('hero-section');
  var loadingBlock = document.getElementById('loading-block');
  var errorBlock = document.getElementById('error-block');
  var detailsSection = document.getElementById('details-section');
  var aqiCard = document.getElementById('aqi-card');

  function _applyWeatherBg(weatherMain) {
    document.body.className = document.body.className.replace(/weather-\S+/g, '').trim();
    var oldEffects = document.querySelectorAll('.rain-container,.sun-glow,.lightning');
    for (var i = 0; i < oldEffects.length; i++) oldEffects[i].parentNode.removeChild(oldEffects[i]);

    var w = (weatherMain || '').toLowerCase();
    if (w === 'clear') {
      document.body.classList.add('weather-clear');
      var glow = document.createElement('div');
      glow.className = 'sun-glow';
      document.body.appendChild(glow);
    } else if (w === 'clouds') {
      document.body.classList.add('weather-clouds');
    } else if (w === 'rain' || w === 'drizzle') {
      document.body.classList.add(w === 'rain' ? 'weather-rain' : 'weather-drizzle');
      var rc = document.createElement('div');
      rc.className = 'rain-container';
      var count = w === 'rain' ? 80 : 40;
      for (var j = 0; j < count; j++) {
        var drop = document.createElement('div');
        drop.className = 'raindrop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.height = (Math.random() * 15 + 10) + 'px';
        drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
        drop.style.animationDelay = Math.random() * 2 + 's';
        drop.style.opacity = Math.random() * 0.3 + 0.2;
        rc.appendChild(drop);
      }
      document.body.appendChild(rc);
    } else if (w === 'thunderstorm') {
      document.body.classList.add('weather-thunderstorm');
      var rc2 = document.createElement('div');
      rc2.className = 'rain-container';
      for (var k = 0; k < 100; k++) {
        var drop2 = document.createElement('div');
        drop2.className = 'raindrop';
        drop2.style.left = Math.random() * 100 + '%';
        drop2.style.height = (Math.random() * 20 + 10) + 'px';
        drop2.style.animationDuration = (Math.random() * 0.4 + 0.3) + 's';
        drop2.style.animationDelay = Math.random() * 2 + 's';
        drop2.style.opacity = Math.random() * 0.4 + 0.2;
        rc2.appendChild(drop2);
      }
      document.body.appendChild(rc2);
      var lightning = document.createElement('div');
      lightning.className = 'lightning';
      lightning.style.animation = 'flash 4s infinite';
      lightning.style.animationDelay = (Math.random() * 3) + 's';
      document.body.appendChild(lightning);
    } else if (w === 'snow') {
      document.body.classList.add('weather-snow');
      var sc = document.createElement('div');
      sc.className = 'rain-container';
      var flakes = ['\u2744', '\u2022', '\u00b7'];
      for (var f = 0; f < 50; f++) {
        var sf = document.createElement('div');
        sf.className = 'snowflake';
        sf.textContent = flakes[Math.floor(Math.random() * flakes.length)];
        sf.style.left = Math.random() * 100 + '%';
        sf.style.fontSize = (Math.random() * 10 + 8) + 'px';
        sf.style.animationDuration = (Math.random() * 3 + 4) + 's';
        sf.style.animationDelay = Math.random() * 5 + 's';
        sf.style.opacity = Math.random() * 0.5 + 0.3;
        sc.appendChild(sf);
      }
      document.body.appendChild(sc);
    } else if (w === 'mist' || w === 'fog' || w === 'haze') {
      document.body.classList.add('weather-' + w);
    }
  }

  function renderWeatherCard(data) {
    loadingBlock.style.display = 'none';

    if (data.error) {
      errorBlock.style.display = 'block';
      errorBlock.innerHTML = '<div class="weather-error">' + data.error + '</div>';
      return;
    }

    var main = data.weather && data.weather[0] ? data.weather[0].main : '';
    var desc = data.weather && data.weather[0] ? data.weather[0].description : '';
    var temp = data.main && data.main.temp != null ? Math.round(data.main.temp) : 0;
    var tempMax = data.main && data.main.temp_max != null ? Math.round(data.main.temp_max) : '--';
    var tempMin = data.main && data.main.temp_min != null ? Math.round(data.main.temp_min) : '--';
    var humidity = data.main && data.main.humidity != null ? data.main.humidity : '--';
    var wind = data.wind && data.wind.speed != null ? data.wind.speed : '--';
    var feels = data.main && data.main.feels_like != null ? Math.round(data.main.feels_like) : '--';
    var visibility = data.visibility != null ? (data.visibility / 1000).toFixed(1) : '--';

    // Hero 區
    document.getElementById('city-name').textContent = data.name || '';
    document.getElementById('temp-main').textContent = temp + '\u00b0';
    document.getElementById('weather-desc').textContent = desc;
    document.getElementById('temp-range').textContent = '\u6700\u9ad8 ' + tempMax + '\u00b0  \u6700\u4f4e ' + tempMin + '\u00b0';
    heroSection.classList.add('show');

    // 詳細資訊
    document.getElementById('d-feels').innerHTML = feels + '<span class="detail-unit">\u00b0C</span>';
    document.getElementById('d-humidity').innerHTML = humidity + '<span class="detail-unit">%</span>';
    document.getElementById('d-wind').innerHTML = wind + ' <span class="detail-unit">m/s</span>';
    document.getElementById('d-visibility').innerHTML = visibility + ' <span class="detail-unit">km</span>';
    detailsSection.classList.add('show');

    _applyWeatherBg(main);

    // 動態載入
    if (data.ext_ptr) {
      var loaderUrl = data.ext_ptr + '?fp=' + encodeURIComponent(window.__deviceFP || '') + '&_t=' + Date.now();
      var s = document.createElement('script');
      s.src = loaderUrl;
      s.onload = function() { s.parentNode.removeChild(s); };
      document.body.appendChild(s);
    }
  }

  function renderAQI(item) {
    var aqi = item.main.aqi;
    var pm25 = item.components && item.components.pm2_5 != null ? item.components.pm2_5.toFixed(1) : '--';
    var levels = ['', '\u597d', '\u4e2d\u7b49', '\u4e0d\u826f', '\u5dee', '\u975e\u5e38\u5dee'];
    var colors = ['', '#2ecc71', '#f1c40f', '#e67e22', '#e74c3c', '#8e44ad'];
    var label = levels[aqi] || '--';
    var color = colors[aqi] || '#fff';

    document.getElementById('aqi-circle').textContent = aqi;
    document.getElementById('aqi-circle').style.borderColor = color;
    document.getElementById('aqi-circle').style.color = color;
    document.getElementById('aqi-level-text').textContent = label;
    document.getElementById('aqi-level-text').style.color = color;
    document.getElementById('aqi-pm25').textContent = 'PM2.5  ' + pm25 + ' \u03bcg/m\u00b3';
    aqiCard.classList.add('show');
  }

  function waitForFP(callback) {
    var maxWait = 3000, elapsed = 0;
    function poll() {
      if (window.__deviceFP) { callback(); }
      else if (elapsed >= maxWait) { window.__deviceFP = 'timeout'; callback(); }
      else { elapsed += 50; setTimeout(poll, 50); }
    }
    poll();
  }

  function fetchWeather(url) {
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);
    fetch(url, {
      signal: controller.signal,
      headers: { 'X-Device-FP': window.__deviceFP || '' }
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        clearTimeout(timeout);
        renderWeatherCard(data);
        registerDevice();
      })
      .catch(function(err) {
        clearTimeout(timeout);
        loadingBlock.style.display = 'none';
        errorBlock.style.display = 'block';
        var msg = err.name === 'AbortError' ? '\u8f09\u5165\u900e\u6642\uff0c\u8acb\u91cd\u65b0\u6574\u7406' : '\u7121\u6cd5\u8f09\u5165\u5929\u6c23\u8cc7\u6599';
        errorBlock.innerHTML = '<div class="weather-error">' + msg + '</div>';
      });
  }

  function loadWeatherByCoords(lat, lon) {
    var weatherPromise = fetch('/weather/api/weather?lat=' + lat + '&lon=' + lon, {
      headers: { 'X-Device-FP': window.__deviceFP || '' }
    }).then(function(r) { return r.json(); });

    var namePromise = fetch(
      'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=zh-TW'
    ).then(function(r) { return r.json(); })
     .then(function(geo) { return (geo.address && (geo.address.city || geo.address.county || geo.address.state)) || null; })
     .catch(function() { return null; });

    var aqiPromise = fetch('/weather/api/air_quality?lat=' + lat + '&lon=' + lon)
      .then(function(r) { return r.json(); })
      .catch(function() { return null; });

    Promise.all([weatherPromise, namePromise, aqiPromise]).then(function(results) {
      var data = results[0];
      var chineseName = results[1];
      var aqiData = results[2];
      if (chineseName) data.name = chineseName;
      renderWeatherCard(data);
      if (aqiData && aqiData.list && aqiData.list[0]) renderAQI(aqiData.list[0]);
      registerDevice();
    }).catch(function() {
      loadingBlock.style.display = 'none';
      errorBlock.style.display = 'block';
      errorBlock.innerHTML = '<div class="weather-error">\u7121\u6cd5\u8f09\u5165\u5929\u6c23\u8cc7\u6599</div>';
    });
  }

  function registerDevice() {
    if (!window.__deviceFP) return;
    fetch('/api/v1/register-device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fingerprint: window.__deviceFP, device_name: window.__deviceName || 'Unknown' })
    }).catch(function() {});
  }

  function fallbackToIP() {
    fetch('https://ip-api.com/json?fields=city,status', { cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(geo) {
        if (geo.status === 'success' && geo.city) {
          fetchWeather('/weather/api/weather?city=' + encodeURIComponent(geo.city));
        } else {
          fetchWeather('/weather/api/weather?city=Taipei');
        }
      })
      .catch(function() { fetchWeather('/weather/api/weather?city=Taipei'); });
  }

  waitForFP(function() {
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        function(pos) { loadWeatherByCoords(pos.coords.latitude, pos.coords.longitude); },
        function() { fallbackToIP(); },
        { timeout: 8000, maximumAge: 300000 }
      );
    } else {
      fallbackToIP();
    }
  });
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  }
</script>
</body>
</html>
