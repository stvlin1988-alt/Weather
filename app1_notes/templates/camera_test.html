<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>鏡頭測試</title></head>
<body style="background:#111;color:#eee;font-family:sans-serif;padding:2rem;">
  <h2>鏡頭測試</h2>
  <video id="video" width="640" height="480" autoplay playsinline muted style="background:#000;display:block;border:2px solid #3498db;"></video>
  <br>
  <select id="camSelect" style="padding:.4rem;font-size:1rem;margin-top:.5rem;display:block;"></select>
  <button id="btn" onclick="startCam()" style="padding:.5rem 1.5rem;font-size:1rem;margin-top:.5rem;">開啟鏡頭</button>
  <p id="msg" style="color:yellow;">載入裝置清單中...</p>

  <script>
    console.log('頁面載入完成');

    // 先列出所有鏡頭
    navigator.mediaDevices.enumerateDevices().then(function(devices) {
      var sel = document.getElementById('camSelect');
      var cams = devices.filter(function(d) { return d.kind === 'videoinput'; });
      cams.forEach(function(d, i) {
        var opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || ('Camera ' + i);
        sel.appendChild(opt);
      });
      document.getElementById('msg').textContent = '找到 ' + cams.length + ' 個鏡頭，請選擇後按開啟';
    });

    function startCam() {
      var deviceId = document.getElementById('camSelect').value;
      console.log('選擇裝置:', deviceId);
      document.getElementById('msg').textContent = '嘗試開啟中...';

      navigator.mediaDevices.getUserMedia({ video: deviceId ? { deviceId: { exact: deviceId } } : true })
        .then(function(stream) {
          console.log('成功取得串流', stream);
          var tracks = stream.getVideoTracks();
          console.log('video tracks 數量:', tracks.length);
          if (tracks.length > 0) {
            console.log('track[0] label:', tracks[0].label);
            console.log('track[0] readyState:', tracks[0].readyState);
            console.log('track[0] enabled:', tracks[0].enabled);
            console.log('track[0] settings:', JSON.stringify(tracks[0].getSettings()));
          }
          var v = document.getElementById('video');
          v.srcObject = stream;
          v.onloadedmetadata = function() {
            console.log('video size:', v.videoWidth, 'x', v.videoHeight);
            document.getElementById('msg').textContent = '成功！尺寸：' + v.videoWidth + 'x' + v.videoHeight;
          };
          v.play().then(function() {
            console.log('play() 成功, videoWidth:', v.videoWidth);
          }).catch(function(e) {
            console.error('play() 失敗:', e);
          });
          setTimeout(function() {
            console.log('2秒後 readyState:', v.readyState, '| currentTime:', v.currentTime, '| videoWidth:', v.videoWidth, '| videoHeight:', v.videoHeight);
          }, 2000);
        })
        .catch(function(err) {
          console.error('錯誤:', err.name, err.message);
          document.getElementById('msg').textContent = '錯誤：' + err.name + ' - ' + err.message;
        });
    }
  </script>
</body>
</html>
