{% extends "base.html" %}
{% block title %}註冊 — NOTE{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:2rem auto;">
  <h2 style="margin-bottom:1.5rem;">建立帳號</h2>
  <div class="form-group">
    <label>使用者名稱</label>
    <input type="text" id="username" placeholder="中文或英文均可">
  </div>
  <div class="form-group">
    <label>4 位數 PIN</label>
    <input type="password" id="pin" maxlength="4" placeholder="0000–9999">
  </div>
  <div class="form-group">
    <label>人臉照片（選填）</label>
    <video id="video" width="320" height="240" autoplay playsinline style="border-radius:6px;background:#000;display:block;margin-bottom:.5rem;"></video>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
      <button class="btn btn-secondary" id="btn-start-cam">開啟鏡頭</button>
      <button class="btn btn-primary" id="btn-capture" disabled>拍照</button>
    </div>
    <div id="preview" style="margin-top:.5rem;"></div>
  </div>
  <div id="msg" style="margin-bottom:.75rem;color:#e74c3c;min-height:1.2em;"></div>
  <button class="btn btn-primary" id="btn-register" style="width:100%;">註冊</button>
  <p style="margin-top:1rem;text-align:center;font-size:.9rem;">已有帳號？<a href="{{ url_for('auth.login') }}">登入</a></p>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
const cam = new Camera('video', 'canvas');
let capturedImage = null;

document.getElementById('btn-start-cam').onclick = () => cam.start().then(() => {
  document.getElementById('btn-capture').disabled = false;
  document.getElementById('btn-start-cam').disabled = true;
});

document.getElementById('btn-capture').onclick = () => {
  capturedImage = cam.capture();
  const img = document.createElement('img');
  img.src = capturedImage;
  img.style.cssText = 'width:120px;border-radius:6px;border:2px solid #27ae60;';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('preview').appendChild(img);
};

document.getElementById('btn-register').onclick = async () => {
  const username = document.getElementById('username').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const msg = document.getElementById('msg');
  if (!username || !pin) { msg.textContent = '請填寫帳號和 PIN'; return; }
  const body = { username, pin };
  if (capturedImage) body.face_image = capturedImage;
  const res = await fetch('/auth/register', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.status === 'ok') {
    if (capturedImage) {
      // Enroll face after registration — need to login first
      msg.textContent = '註冊成功！請登入後至設定登錄人臉。';
    } else {
      msg.style.color = '#27ae60';
      msg.textContent = '註冊成功！';
    }
    setTimeout(() => location.href = '/auth/login', 1500);
  } else {
    msg.textContent = data.message || '註冊失敗';
  }
};
</script>
{% endblock %}
